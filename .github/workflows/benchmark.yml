name: Architecture Benchmark - Percentile Regression

on:
  pull_request:
  push:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      artifact-name: repo
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
          
      - name: Run Gradle build
        run: gradle build
          
      - name: gRPC benchmark
        shell: bash
        run: |
          
          docker compose -f compose.grpc.yaml up -d
        
          cd benchmarks
          bash install-fortio.sh
          fortio version

          bash healthcheck.sh grpc
          bash benchmark.sh grpc localhost:9090 1000 10 4 2
          bash benchmark.sh grpc localhost:9090 5000 20 4 2

          python3 compare_percentiles.py \
            baseline/grpc.json \
            results/grpc-5000qps-20s-4c-2streams.json

          cd ..
          docker compose -f compose.grpc.yaml stop
          if [ -n "$(docker ps -q)" ]; then docker stop $(docker ps -q); fi

      - name: Upload gRPC benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-grpc
          path: benchmarks/results/
    
      - name: Webflux benchmark
        shell: bash
        run: |
          docker compose -f compose.webflux.yaml up -d --remove-orphans

          cd benchmarks
          bash healthcheck.sh webflux
          bash benchmark.sh http-webflux localhost:8081 1000 10 8
          bash benchmark.sh http-webflux localhost:8081 5000 20 8

          python3 compare_percentiles.py \
            baseline/http-webflux.json \
            results/http-webflux-5000qps-20s-8c.json

      - name: Upload Webflux benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-webflux
          path: benchmarks/results/